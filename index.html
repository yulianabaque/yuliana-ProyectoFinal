<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Experiencia interactiva multiverso donde eliges tu energía y revelas tu destino.">
<title>Neon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="shortcut icon" href="img/favicon.webp" type="image/x-icon">

<link rel="stylesheet" href="css/style.css">
<script src="script.js" defer></script>
</head>

<body>

<header id="inicio" class="cyber-wrapper">

    <div class="cyber-card">

        <div class="cyber-top">
            <span class="cyber-badge">MULTIVERSE MODE</span>

            <nav class="cyber-nav" aria-label="Navegación principal">
                <a href="#inicio" title="Ir a Inicio">Inicio</a>
                <a href="#pregunta" title="Ir a Energía">Energía</a>
                <a href="#destino" title="Ir a Destino">Destino</a>
                <a href="#contacto" title="Ir a Contacto">Contacto</a>
            </nav>
        </div>

        <div class="cyber-content">

            <div class="left-content">

                <h1 class="cyber-title">
                    NEON <span>PATHS</span>
                </h1>

                <p class="cyber-subtitle">
                    LIMITED REALITY ONLY
                </p>

                <div class="cyber-line"></div>

                <p class="cyber-text">
                    Elige tu energía. Despierta tu versión alternativa.
                    El multiverso está detectando tu frecuencia y alterando el destino.
                </p>

                <div class="cyber-buttons">
                    <button type="button"
                            class="btn-primary despertar-btn"
                            aria-controls="energiaAudio">
                        DESPERTAR
                    </button>

                    <button type="button"
                            class="btn-secondary revelar-btn"
                            aria-controls="energiaAudio">
                        DESCANSAR
                    </button>
                </div>

            </div>

            <div class="right-deco" aria-hidden="true">
                <div class="neon-square"></div>
                <div class="neon-circle"></div>
            </div>

        </div>

    </div>

</header>

<main>

<section id="pregunta" class="question-section">

    <h2>¿De dónde nace tu poder?</h2>

    <fieldset class="options-wrapper">
        <legend class="visually-hidden">Selecciona tu energía</legend>

        <input type="radio" name="energia" id="conexion" value="conexion" required>
        <label for="conexion" class="option-card">💞 Conexión</label>

        <input type="radio" name="energia" id="mente" value="mente">
        <label for="mente" class="option-card">🧠 Mente</label>

        <input type="radio" name="energia" id="caos" value="caos">
        <label for="caos" class="option-card">🔥 Caos</label>

        <input type="radio" name="energia" id="oscuridad" value="oscuridad">
        <label for="oscuridad" class="option-card">🌑 Oscuridad</label>
    </fieldset>

</section>


</body>
</html>
